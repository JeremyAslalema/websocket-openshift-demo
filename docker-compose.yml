version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: websocket-server
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
    volumes:
      - ./server/src:/app/src
      - ./server/package.json:/app/package.json
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - websocket-network

  client:
    image: nginx:alpine
    container_name: websocket-client
    ports:
      - "3000:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
    depends_on:
      - server
    networks:
      - websocket-network

networks:
  websocket-network:
    driver: bridge